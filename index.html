<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIFA World Cup 2026 — Match Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #08090D;
    --card: #111318;
    --card-hover: #16181F;
    --border: #1E2028;
    --text: #F2F2F2;
    --muted: #9A9DA8;
    --accent: #00C97B;
    --selected-bg: #0D1F17;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2A2B35; border-radius: 2px; }
  ::selection { background: #00C97B33; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ─── Header ─── */
  .pitch-header {
    background: linear-gradient(180deg, #0C1A10 0%, #081208 60%, var(--bg) 100%);
    position: relative;
    overflow: hidden;
    padding: 48px 24px 36px;
    text-align: center;
  }
  .pitch-grid {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 59px, #ffffff08 59px, #ffffff08 60px),
      repeating-linear-gradient(0deg,  transparent, transparent 59px, #ffffff08 59px, #ffffff08 60px);
    background-size: 60px 60px;
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, transparent 100%);
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, transparent 100%);
    pointer-events: none;
  }
  .pitch-circle {
    position: absolute;
    top: -24px; left: 50%; transform: translateX(-50%);
    width: 180px; height: 180px;
    border: 1px solid #ffffff0E;
    border-radius: 50%;
    pointer-events: none;
  }
  .header-content { position: relative; }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header-sub {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
  }
  .update-status {
    margin-top: 10px;
    font-size: 11px;
    font-weight: 500;
    min-height: 16px;
    letter-spacing: 0.01em;
    transition: color 0.2s;
  }
  .update-status.loading { color: var(--muted); }
  .update-status.ok { color: var(--accent); }
  .update-status.error { color: #E0795B; }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 4px;
    max-width: 820px;
    margin: 0 auto;
    padding: 14px 16px 0;
  }
  .tab {
    position: relative;
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    padding: 10px 18px;
    border-radius: 8px 8px 0 0;
    min-height: 44px;
    transition: color 0.15s, background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 14px; right: 14px; bottom: -1px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }
  .tab-badge {
    font-size: 11px;
    font-weight: 700;
    background: var(--card-hover);
    color: var(--text);
    border-radius: 10px;
    padding: 1px 7px;
    min-width: 18px;
    text-align: center;
  }
  .tab.active .tab-badge { background: var(--accent); color: #04130C; }

  /* ─── Sticky controls ─── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(8, 9, 13, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
  }
  .controls-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
    max-width: 260px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 14px 9px 36px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #00C97B55; }
  .search-input::placeholder { color: var(--muted); }
  .select-all-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 4px;
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .select-all-btn:hover { color: var(--accent); }

  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: none;
    border: 1px solid #3A3B47;
    color: #B8BAC4;
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .filter-btn:hover { border-color: #55576A; color: var(--text); }
  .filter-btn.active { background: #00C97B18; border-color: #00C97B77; color: var(--accent); }

  /* ─── Main list ─── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 16px 140px;
  }
  .day-section { margin-bottom: 28px; }
  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .day-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .day-rule { flex: 1; height: 1px; background: var(--border); }
  .day-count { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  .matches { display: flex; flex-direction: column; gap: 6px; }

  .match-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .match-card:hover { background: var(--card-hover); border-color: #2E3040; }
  .match-card.selected { background: var(--selected-bg); border-color: #00C97B55; }
  .match-card:active { transform: scale(0.997); }
  /* played matches: not selectable, slightly recessed, no pointer cursor */
  .match-card.played {
    cursor: default;
    background: #0C0D11;
    border-color: #16171D;
    opacity: 0.92;
  }
  .match-card.played:hover { background: #0C0D11; border-color: #16171D; }
  .match-card.played:active { transform: none; }
  .played-mark {
    width: 20px; height: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    opacity: 0.8;
  }

  .check-box {
    width: 20px; height: 20px;
    border: 1.5px solid #3A3B47;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .match-card.selected .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-icon { display: none; }
  .match-card.selected .check-icon { display: block; }

  .match-time {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--muted);
    min-width: 48px;
    flex-shrink: 0;
    font-weight: 500;
    transition: color 0.12s;
  }
  .match-card.selected .match-time { color: var(--accent); }
  /* played-match score in the time slot */
  .match-time.score {
    color: var(--text);
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: baseline;
    gap: 2px;
    letter-spacing: 0.02em;
  }
  .match-time.score .score-dash { color: var(--muted); padding: 0 1px; }
  .match-time.score .ft-tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-left: 5px;
    align-self: center;
    border: 1px solid #00C97B44;
    border-radius: 4px;
    padding: 1px 3px;
  }
  .match-time.score .ft-tag.prov {
    color: #E0A52B;
    border-color: #E0A52B66;
  }
  /* provisional score slightly dimmed to read as "not yet confirmed" */
  .match-time.score.provisional { color: #E9D8B0; }

  .match-info { flex: 1; min-width: 0; }
  .match-teams {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #D0D0D8;
    transition: color 0.12s;
  }
  .match-card.selected .match-teams { color: var(--text); }
  .vs { color: var(--muted); font-weight: 400; }
  .match-teams .team.win { color: var(--accent); font-weight: 700; }
  .match-teams .team.resolved { color: var(--text); }
  .match-venue {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stage-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    background: #16181F;
    padding: 3px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .badge-final   { color: #F5C842; background: #1E1A0C; }
  .badge-semi    { color: #E07F00; background: #1A1208; }
  .badge-qf      { color: #8B6FE8; background: #120F1E; }
  .badge-r16     { color: #5BA8F5; background: #0A1220; }
  .badge-r32     { color: #8FBFDF; background: #0C151D; }
  .badge-third   { color: #C0C0C0; background: #161618; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 80px 0;
  }
  .empty-state svg { margin-bottom: 14px; opacity: 0.35; }
  .empty-state .empty-sub { font-size: 13px; opacity: 0.7; margin-top: 6px; }
  .day-header.static { cursor: default; }

  /* ─── Export tray ─── */
  .export-tray {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0D0E13;
    border-top: 1px solid var(--border);
    z-index: 100;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .export-tray.visible { transform: translateY(0); }
  .export-tray-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tray-left { display: flex; align-items: baseline; gap: 8px; }
  .tray-count { font-size: 15px; font-weight: 600; }
  .tray-label { font-size: 12px; color: var(--muted); }
  .tray-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-decoration: none;
  }
  .export-btn:hover { border-color: #00C97B66; color: var(--accent); }
  .export-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .export-btn.primary:hover { background: #00DF8A; border-color: #00DF8A; color: #000; }
  .clear-btn {
    background: none; border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 9px 4px;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--text); }

  @media (max-width: 600px) {
    .match-venue { display: none; }
    .pitch-header { padding: 36px 16px 28px; }
    main { padding: 20px 12px 140px; }
    .controls { padding: 10px 14px; }
    .export-tray-inner { padding: 12px 14px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .match-card, .export-tray, .export-btn, .filter-btn { transition: none !important; }
  }

  /* ─── Components added after original (calendar, collapse), styled in the original dark-green language ─── */
  .controls-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 16px;
  }
  /* original .controls used 12px 24px padding; controls-inner now handles the side padding */
  .controls { padding: 12px 0; }

  /* mini calendar strip */
  .calendar {
    display: flex;
    justify-content: safe center;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 2px 8px;
    margin-top: 12px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    cursor: grab;
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
    mask-image: linear-gradient(to right, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
  }
  .calendar.dragging { cursor: grabbing; scroll-behavior: auto; }
  .calendar::-webkit-scrollbar { height: 6px; }
  .calendar::-webkit-scrollbar-track { background: transparent; }
  .calendar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .calendar::-webkit-scrollbar-thumb:hover { background: #2E3040; }
  .cal-day {
    flex: 0 0 auto;
    min-width: 52px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 8px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .cal-day:hover { border-color: #2E3040; background: var(--card-hover); }
  .cal-day.weekend { border-color: #00C97B33; }
  .cal-day.today {
    border-color: var(--accent);
    background: #0D1F17;
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .cal-day.today .cal-num { color: var(--accent); }
  .cal-dow {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .cal-num { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .cal-mon { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .cal-meta {
    margin-top: 3px;
    font-size: 9px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .cal-seldot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  /* collapsible day sections */
  .day-section { scroll-margin-top: 130px; }
  .day-header { cursor: pointer; user-select: none; }
  .day-toggle {
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    color: var(--muted);
    display: flex;
    align-items: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s, color 0.15s;
  }
  .day-section.collapsed .day-toggle { transform: rotate(-90deg); }
  .day-header:hover .day-toggle { color: var(--accent); }
  .day-section.collapsed .matches { display: none; }

</style>
</head>
<body>

<header class="pitch-header">
  <div class="pitch-grid" aria-hidden="true"></div>
  <div class="pitch-circle" aria-hidden="true"></div>
  <div class="header-content">
    <p class="header-eyebrow">FIFA World Cup 2026</p>
    <h1>Pick your matches</h1>
    <p class="header-sub">104 matches &middot; 11 Jun &ndash; 19 Jul &middot; All times Stockholm (CEST)</p>
    <p class="update-status" id="updateStatus" role="status" aria-live="polite"></p>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="View">
  <button class="tab active" id="tabUpcoming" role="tab" aria-selected="true" aria-controls="matchList">Upcoming</button>
  <button class="tab" id="tabResults" role="tab" aria-selected="false" aria-controls="matchList">Results <span class="tab-badge" id="resultsBadge" hidden>0</span></button>
</nav>

<div class="controls" role="search" id="controlsBar">
  <div class="controls-inner">
    <div class="controls-top">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="search" id="search" placeholder="Search team or venue…" aria-label="Search matches"/>
      </div>
      <button class="select-all-btn" id="selectAllBtn" aria-label="Select or deselect all visible matches">Select all</button>
      <button class="select-all-btn" id="collapseAllBtn" aria-label="Collapse or expand all days">Collapse days</button>
    </div>
    <div class="filters" role="group" aria-label="Filter by stage" id="filters"></div>
    <div class="calendar" role="group" aria-label="Jump to date" id="calendar"></div>
  </div>
</div>

<main id="matchList" aria-label="Match list"></main>

<div class="export-tray" id="exportTray" role="region" aria-label="Export selected matches" aria-live="polite">
  <div class="export-tray-inner">
    <div class="tray-left">
      <span class="tray-count" id="trayCount">0</span>
      <span class="tray-label">matches selected &mdash; export to:</span>
    </div>
    <div class="tray-actions">
      <button class="export-btn primary" id="btnICal" aria-label="Download iCal file">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        iCal
      </button>
      <button class="export-btn" id="btnGoogle" aria-label="Add selected matches to Google Calendar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Google Calendar
      </button>
      <button class="export-btn" id="btnOutlook" aria-label="Add selected matches to Outlook Calendar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Outlook
      </button>
      <button class="clear-btn" id="btnClear" aria-label="Clear all selected matches">Clear</button>
    </div>
  </div>
</div>

<script>
const STAGES = ["All","Group Stage","Round of 32","Round of 16","Quarterfinal","Semifinal","Third-Place Match","Final"];
const GROUP_STAGES = ["Group A","Group B","Group C","Group D","Group E","Group F","Group G","Group H","Group I","Group J","Group K","Group L"];

const MATCHES = [
  {id:1,stage:"Group A",date:"2026-06-11",timeET:"15:00",timeGMT1:"20:00",home:"Mexico",away:"South Africa",venue:"Estadio Azteca, Mexico City"},
  {id:2,stage:"Group A",date:"2026-06-11",timeET:"22:00",timeGMT1:"03:00",nextDay:true,home:"South Korea",away:"Czechia",venue:"Estadio Akron, Zapopan"},

function stageGroup(stage) {
  return GROUP_STAGES.includes(stage) ? "Group Stage" : stage;
}

// True UTC instant of kick-off. Source data is in GMT+1 (summer, fixed UTC+1),
// with nextDay meaning the GMT+1 clock time rolled past midnight.
function getMatchUTC(m) {
  const [h, min] = m.timeGMT1.split(":").map(Number);
  const [y, mo, d] = m.date.split("-").map(Number);
  // Build the GMT+1 wall-clock instant as UTC, then subtract 1h to get true UTC.
  let ms = Date.UTC(y, mo - 1, d, h, min || 0, 0);
  if (m.nextDay) ms += 24 * 3600000;
  ms -= 3600000; // GMT+1 -> UTC
  return new Date(ms);
}

// Get calendar parts (year/month/day/weekday/hour/minute) for an instant in a given IANA zone.
function partsInZone(date, tz) {
  const fmt = new Intl.DateTimeFormat("en-GB", {
    timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", weekday: "short", hour12: false,
  });
  const parts = {};
  for (const p of fmt.formatToParts(date)) parts[p.type] = p.value;
  // hour can be "24" in some engines for midnight; normalize
  if (parts.hour === "24") parts.hour = "00";
  return parts;
}

// Official matchday key (YYYY-MM-DD) — the FIFA-listed date, used for grouping
// so the list always matches published schedules/TV guides regardless of timezone.
function matchdayKey(m) {
  return m.date;
}

// ─── Live results (final scores only) from openfootball, fetched on load ───
let RESULTS = {};            // key: `${date}|${normTeam(a)}|${normTeam(b)}` -> [goalsA, goalsB]
let FEED_TEAMS = {};         // official knockout assignment from feed: { [matchId]: {home, away} }
let resultsStatus = "idle";  // idle | loading | ok | error

// Normalize team names so our list and the data source line up.
const TEAM_ALIASES = {
  "czech republic": "czechia",
  "czechia": "czechia",
  "turkey": "turkiye",
  "turkiye": "turkiye",
  "türkiye": "turkiye",
  "korea republic": "south korea",
  "republic of korea": "south korea",
  "south korea": "south korea",
  "cote d'ivoire": "ivory coast",
  "côte d'ivoire": "ivory coast",
  "ivory coast": "ivory coast",
  "cape verde": "cape verde",
  "cabo verde": "cape verde",
  "dr congo": "dr congo",
  "congo dr": "dr congo",
  "democratic republic of the congo": "dr congo",
  "bosnia and herzegovina": "bosnia & herzegovina",
  "bosnia & herzegovina": "bosnia & herzegovina",
  "usa": "usa",
  "united states": "usa",
};
function normTeam(name) {
  let n = (name || "").trim().toLowerCase();
  // strip diacritics so "Türkiye"/"Curaçao" match regardless of source spelling
  n = n.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  return TEAM_ALIASES[n] || n;
}
function resultKey(date, t1, t2) {
  return `${date}|${normTeam(t1)}|${normTeam(t2)}`;
}

// Manually-entered fallback scores for matches the openfootball feed hasn't
// published yet. Keyed by our match id; goals are in [home, away] order.
// These are shown with a "provisional" tag and are AUTOMATICALLY superseded the
// moment the live feed publishes the same match (the feed always wins).
// Remove entries here once the feed has caught up (harmless to leave — feed overrides).
const MANUAL_RESULTS = {
  51: [0, 3],  // Scotland 0–3 Brazil (Group C) — feed lagging as of entry
  52: [4, 2],  // Morocco 4–2 Haiti (Group C) — feed lagging as of entry
};

// Look up a result for a match, with provenance.
// Priority: openfootball feed (authoritative) > manual provisional seed > none.
// Returns { score:[h,a], provisional:bool } or null.
function getResultInfo(m) {
  // 1) direct match on the stored names (works for group stage: real team names)
  const direct = RESULTS[resultKey(m.date, m.home, m.away)];
  if (direct) return { score: direct, provisional: false };
  const flipped = RESULTS[resultKey(m.date, m.away, m.home)];
  if (flipped) return { score: [flipped[1], flipped[0]], provisional: false };

  // 2) knockout matches store placeholders ("Winner C") but the feed records the
  //    score under the REAL team names — so retry using the resolved slot teams.
  if (m.id >= 73) {
    const hn = slotTeam(m, "home"), an = slotTeam(m, "away");
    if (hn !== m.home || an !== m.away) {
      const kd = RESULTS[resultKey(m.date, hn, an)];
      if (kd) return { score: kd, provisional: false };
      const kf = RESULTS[resultKey(m.date, an, hn)];
      if (kf) return { score: [kf[1], kf[0]], provisional: false };
    }
  }

  // 3) manual provisional fallback (matches the feed hasn't published yet)
  if (MANUAL_RESULTS[m.id]) return { score: MANUAL_RESULTS[m.id], provisional: true };
  return null;
}

// Score-only lookup (back-compat for existing callers). Returns [h,a] or null.
function getResult(m) {
  const info = getResultInfo(m);
  return info ? info.score : null;
}

// True if this match's result is provisional (manual seed, not yet in the feed).
function isProvisional(m) {
  const info = getResultInfo(m);
  return !!(info && info.provisional);
}

// A match can be selected for calendar export only if it hasn't been played yet.
function isSelectable(m) { return !getResult(m); }

// Drop any selections that have since become "played" (result arrived this session).
function pruneSelected() {
  let changed = false;
  ID_TO_MATCH && selected.forEach(id => {
    const m = ID_TO_MATCH[id];
    if (m && getResult(m)) { selected.delete(id); changed = true; }
  });
  return changed;
}

// ─── Bracket resolution: fill placeholders with real teams as matches finish ───
let BRACKET = {}; // placeholder label -> real team name

// Final standings for every group whose 6 matches are all played.
function computeGroupStandings() {
  const out = {};
  "ABCDEFGHIJKL".split("").forEach(letter => {
    const groupMatches = MATCHES.filter(m => m.stage === "Group " + letter);
    if (!groupMatches.length) return;
    const results = groupMatches.map(m => ({ m, r: getResult(m) }));
    if (results.some(x => !x.r)) return; // group not finished

    const T = {};
    const ensure = t => (T[t] = T[t] || { team: t, pts: 0, gf: 0, ga: 0, gd: 0 });
    results.forEach(({ m, r }) => {
      const [hg, ag] = r;
      const H = ensure(m.home), A = ensure(m.away);
      H.gf += hg; H.ga += ag; A.gf += ag; A.ga += hg;
      if (hg > ag) H.pts += 3; else if (ag > hg) A.pts += 3; else { H.pts++; A.pts++; }
    });
    Object.values(T).forEach(t => t.gd = t.gf - t.ga);

    const h2hPoints = (teams) => {
      const set = new Set(teams), pts = {}; teams.forEach(t => pts[t] = 0);
      results.forEach(({ m, r }) => {
        if (!set.has(m.home) || !set.has(m.away)) return;
        const [hg, ag] = r;
        if (hg > ag) pts[m.home] += 3; else if (ag > hg) pts[m.away] += 3; else { pts[m.home]++; pts[m.away]++; }
      });
      return pts;
    };

    // Official 2026 order: points, then head-to-head among level teams, then GD, then GF.
    const table = Object.values(T).sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      // head-to-head among all teams currently level on points with these two
      const tiedOnPts = Object.values(T).filter(t => t.pts === a.pts).map(t => t.team);
      if (tiedOnPts.length > 1) {
        const hp = h2hPoints(tiedOnPts);
        if ((hp[b.team] || 0) !== (hp[a.team] || 0)) return (hp[b.team] || 0) - (hp[a.team] || 0);
      }
      if (b.gd !== a.gd) return b.gd - a.gd;
      if (b.gf !== a.gf) return b.gf - a.gf;
      return 0; // remaining FIFA tiebreakers (fair play, drawing of lots) not modelled
    });
    out[letter] = { winner: table[0].team, runnerUp: table[1].team };
  });
  return out;
}

function isPlaceholder(name) {
  return /^(W\d+|Winner [A-L]|Runner-up [A-L]|Best 3rd|Semifinal Loser|Finalist)/.test(name);
}

// Resolve one side ("home"/"away") of a match to a real team name when known.
// Priority: official feed assignment (by match id) > computed/propagated bracket > raw placeholder.
function slotTeam(m, side) {
  const feed = FEED_TEAMS[m.id];
  if (feed && feed[side]) return feed[side];
  const label = side === "home" ? m.home : m.away;
  return BRACKET[label] || label;
}

// Winner of a knockout match (by id) if played; resolves its own teams first.
function knockoutWinner(matchId) {
  const m = ID_TO_MATCH[matchId];
  if (!m) return null;
  const r = getResult(m);
  if (!r) return null;
  const [hg, ag] = r;
  if (hg === ag) return null; // need a winner; if feed has no decider, stay unresolved
  const name = hg > ag ? slotTeam(m, "home") : slotTeam(m, "away");
  return isPlaceholder(name) ? null : name;
}

// Loser of a knockout match (used for the third-place playoff).
function knockoutLoser(matchId) {
  const m = ID_TO_MATCH[matchId];
  if (!m) return null;
  const r = getResult(m);
  if (!r) return null;
  const [hg, ag] = r;
  if (hg === ag) return null;
  const name = hg > ag ? slotTeam(m, "away") : slotTeam(m, "home");
  return isPlaceholder(name) ? null : name;
}

// Rebuild the placeholder->team map from current results + official feed assignments.
function rebuildBracket() {
  const map = {};
  // group winners / runners-up from computed standings (fallback layer)
  const standings = computeGroupStandings();
  Object.entries(standings).forEach(([letter, s]) => {
    map["Winner " + letter] = s.winner;
    map["Runner-up " + letter] = s.runnerUp;
  });
  BRACKET = map;
  // knockout winners: iterate so later rounds resolve once feeders are known
  for (let pass = 0; pass < 8; pass++) {
    let changed = false;
    MATCHES.forEach(m => {
      if (m.id < 73) return;
      const key = "W" + m.id;
      if (map[key]) return;
      const w = knockoutWinner(m.id);
      if (w) { map[key] = w; changed = true; }
    });
    BRACKET = map;
    if (!changed) break;
  }

  // Final + third-place use named placeholders, not W## refs.
  // "Finalist 1/2" = winners of the two semifinals (in id order).
  // "Semifinal Loser 1/2" = losers of those same semifinals.
  const semis = MATCHES.filter(m => m.stage === "Semifinal").sort((a, b) => a.id - b.id);
  semis.forEach((sm, i) => {
    const w = knockoutWinner(sm.id);
    const l = knockoutLoser(sm.id);
    if (w) map["Finalist " + (i + 1)] = w;
    if (l) map["Semifinal Loser " + (i + 1)] = l;
  });
  BRACKET = map;
}

// Display name for a team label: resolved team if known, else the placeholder label.
function teamName(label) { return BRACKET[label] || label; }


async function fetchResults() {
  resultsStatus = "loading";
  renderUpdateStatus();
  const URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
  try {
    const r = await fetch(URL, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    // openfootball may use {matches:[...]} or {rounds:[{matches:[...]}]}
    const feedMatches = data.matches
      ? data.matches
      : (data.rounds || []).flatMap(rd => rd.matches || []);

    const teamStr = t => (t == null ? "" : (typeof t === "string" ? t : (t.name || ""))).trim();
    // strip a trailing " (XYZ)" confederation/code suffix some feeds add
    const cleanTeam = s => s.replace(/\s*\([A-Z]{2,3}\)\s*$/, "").trim();
    const looksPlaceholder = s =>
      /winner|runner|loser|group|match\s*\d|best\s*3|3rd|placeholder|tbd|\//i.test(s)   // text placeholders & any "A/B/C" third-place slot
      || /^[WL]\d{1,3}$/i.test(s)        // W74 / L101
      || /^[123][A-L]$/i.test(s)         // 1C = winner C, 2F = runner-up F, 3A = third A
      || s === "";

    const scoreMap = {};
    const feedTeams = {};
    feedMatches.forEach(mt => {
      const t1 = cleanTeam(teamStr(mt.team1));
      const t2 = cleanTeam(teamStr(mt.team2));
      // scores: support {score:{ft:[a,b]}} and score1/score2
      let ft = mt.score && mt.score.ft;
      if (!Array.isArray(ft) && mt.score1 != null && mt.score2 != null) ft = [mt.score1, mt.score2];
      if (Array.isArray(ft) && ft.length === 2 && ft[0] != null && ft[1] != null && t1 && t2) {
        scoreMap[resultKey(mt.date, t1, t2)] = [ft[0], ft[1]];
      }
      // official knockout team assignment, keyed by FIFA match number (== our id)
      if (mt.num != null && ID_TO_MATCH[mt.num] && ID_TO_MATCH[mt.num].id >= 73) {
        const assign = {};
        if (t1 && !looksPlaceholder(t1)) assign.home = t1;
        if (t2 && !looksPlaceholder(t2)) assign.away = t2;
        if (assign.home || assign.away) feedTeams[mt.num] = assign;
      }
    });
    RESULTS = scoreMap;
    FEED_TEAMS = feedTeams;
    resultsStatus = "ok";
    renderUpdateStatus();
    render();
  } catch (e) {
    resultsStatus = "error";
    renderUpdateStatus();
    // App keeps working with no scores — fail silent beyond the status pill.
  }
}

function renderUpdateStatus() {
  const el = document.getElementById("updateStatus");
  if (!el) return;
  const n = Object.keys(RESULTS).length;
  // count manual results still in effect (not yet superseded by the feed)
  const provCount = Object.keys(MANUAL_RESULTS).filter(id => {
    const m = ID_TO_MATCH[id]; return m && isProvisional(m);
  }).length;
  const provNote = provCount ? ` · ${provCount} provisional` : "";
  if (resultsStatus === "loading") { el.textContent = "Updating results…"; el.className = "update-status loading"; }
  else if (resultsStatus === "ok") {
    const groups = Object.keys(computeGroupStandings()).length;
    let msg = n ? `Results updated · ${n} played` : "Results updated · none yet";
    if (groups) msg += ` · ${groups}/12 groups decided`;
    el.textContent = msg + provNote;
    el.className = "update-status ok";
  }
  else if (resultsStatus === "error") {
    const isFile = location.protocol === "file:";
    el.textContent = (isFile
      ? "Live results blocked when opened as a local file — host it or open via a server to enable updates"
      : "Couldn't fetch live results (offline?)") + provNote;
    el.className = "update-status error";
  }
  else { el.textContent = ""; el.className = "update-status"; }
}

// Local date key (YYYY-MM-DD) of a match in the selected zone — kick-off's real local date.
function localDateKey(m) {
  const p = partsInZone(getMatchUTC(m), userTZ);
  return `${p.year}-${p.month}-${p.day}`;
}

// Local kick-off time "HH:MM" in the selected zone.
function localTime(m) {
  const p = partsInZone(getMatchUTC(m), userTZ);
  return `${p.hour}:${p.minute}`;
}

// Day offset of the match's local date vs its scheduled (home) date: -1, 0, or +1.
function dayDelta(m) {
  const key = localDateKey(m);
  const sched = m.nextDay
    ? (() => { const d = new Date(m.date + "T00:00:00Z"); d.setUTCDate(d.getUTCDate() + 1); return d.toISOString().slice(0,10); })()
    : m.date;
  if (key === sched) return 0;
  return key < sched ? -1 : 1;
}

function isWeekendKey(dateStr) {
  // dateStr is YYYY-MM-DD; treat as a plain calendar date
  const [y, mo, d] = dateStr.split("-").map(Number);
  const day = new Date(Date.UTC(y, mo - 1, d, 12)).getUTCDay();
  return day === 0 || day === 6;
}

function formatDate(dateStr) {
  const [y, mo, d] = dateStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, mo - 1, d, 12));
  const base = dt.toLocaleDateString("en-GB", {weekday:"short", day:"numeric", month:"short", timeZone:"UTC"});
  return isWeekendKey(dateStr) ? base + " 🎉" : base;
}

// Friendly label for the current zone, with live UTC offset.
function tzLabel(tz) {
  try {
    const parts = new Intl.DateTimeFormat("en-GB", {timeZone: tz, timeZoneName: "shortOffset"}).formatToParts(new Date());
    const off = parts.find(p => p.type === "timeZoneName");
    const city = tz.split("/").pop().replace(/_/g, " ");
    return `${city} (${off ? off.value : tz})`;
  } catch { return tz; }
}

function getStartDate(m) {
  // Kept for any legacy callers: returns the true UTC instant.
  return getMatchUTC(m);
}

function fmtICS(dt) {
  return dt.toISOString().replace(/[-:]/g,"").replace(".000","");
}

function buildICS(ids) {
  const sel = MATCHES.filter(m => ids.has(m.id));
  const lines = [
    "BEGIN:VCALENDAR","VERSION:2.0",
    "PRODID:-//FIFA World Cup 2026 Selector//EN",
    "X-WR-CALNAME:FIFA World Cup 2026 — My Matches",
    "CALSCALE:GREGORIAN","METHOD:PUBLISH",
  ];
  sel.forEach(m => {
    const start = getStartDate(m);
    const end = new Date(start.getTime() + 2*3600000);
    lines.push("BEGIN:VEVENT");
    lines.push("UID:wc2026-"+m.id+"@selector");
    lines.push("SUMMARY:\u26BD "+slotTeam(m,"home")+" vs "+slotTeam(m,"away")+" ("+m.stage+")");
    lines.push("DTSTART:"+fmtICS(start));
    lines.push("DTEND:"+fmtICS(end));
    lines.push("LOCATION:"+m.venue);
    lines.push("DESCRIPTION:FIFA World Cup 2026 \u2014 "+m.stage+" | Kick-off: "+localTime(m)+" "+tzLabel(userTZ));
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

function toGoogleURL(m) {
  const start = getStartDate(m);
  const end = new Date(start.getTime() + 2*3600000);
  const fmt = dt => dt.toISOString().replace(/[-:]/g,"").replace(".000Z","Z");
  const p = new URLSearchParams({
    action:"TEMPLATE",
    text:"\u26BD "+slotTeam(m,"home")+" vs "+slotTeam(m,"away")+" \u2014 FIFA World Cup 2026",
    dates:fmt(start)+"/"+fmt(end),
    details:m.stage+" | FIFA World Cup 2026",
    location:m.venue,
  });
  return "https://calendar.google.com/calendar/render?"+p;
}

function toOutlookURL(m) {
  const start = getStartDate(m);
  const end = new Date(start.getTime() + 2*3600000);
  const p = new URLSearchParams({
    path:"/calendar/action/compose",
    rru:"addevent",
    subject:"\u26BD "+slotTeam(m,"home")+" vs "+slotTeam(m,"away")+" \u2014 FIFA World Cup 2026",
    startdt:start.toISOString(),
    enddt:end.toISOString(),
    body:m.stage+" | FIFA World Cup 2026",
    location:m.venue,
  });
  return "https://outlook.live.com/calendar/0/deeplink/compose?"+p;
}

function badgeClass(stage) {
  if (stage === "Final") return "stage-badge badge-final";
  if (stage === "Semifinal") return "stage-badge badge-semi";
  if (stage === "Quarterfinal") return "stage-badge badge-qf";
  if (stage === "Round of 16") return "stage-badge badge-r16";
  if (stage === "Round of 32") return "stage-badge badge-r32";
  if (stage === "Third-Place Match") return "stage-badge badge-third";
  return "stage-badge";
}

function badgeText(stage) {
  return stage.replace("Group ","Grp ");
}

function getFiltered() {
  return MATCHES.filter(m => {
    if (!isSelectable(m)) return false;           // played matches live on the Results tab
    const sg = stageGroup(m.stage);
    const stageOK = activeFilter === "All" || sg === activeFilter || m.stage === activeFilter;
    const q = searchQuery.toLowerCase();
    const searchOK = !q || slotTeam(m,"home").toLowerCase().includes(q) || slotTeam(m,"away").toLowerCase().includes(q) || m.home.toLowerCase().includes(q) || m.away.toLowerCase().includes(q) || m.venue.toLowerCase().includes(q);
    return stageOK && searchOK;
  });
}

// All played matches, most-recent first (for the Results tab).
function getResults() {
  return MATCHES.filter(m => !isSelectable(m))
    .sort((a, b) => getMatchUTC(b) - getMatchUTC(a));
}

function groupByDate(list) {
  const map = {};
  list.forEach(m => { const k = matchdayKey(m); if (!map[k]) map[k] = []; map[k].push(m); });
  // sort each day's matches by actual kick-off instant
  Object.values(map).forEach(arr => arr.sort((a,b) => getMatchUTC(a) - getMatchUTC(b)));
  return Object.entries(map).sort(([a],[b]) => a.localeCompare(b));
}

function renderCalendar() {
  const wrap = document.getElementById("calendar");
  const prevScroll = wrap.scrollLeft;
  wrap.innerHTML = "";
  const grouped = groupByDate(getFiltered());
  grouped.forEach(([date, dayMatches]) => {
    const [cy, cmo, cd] = date.split("-").map(Number);
    const d = new Date(Date.UTC(cy, cmo - 1, cd, 12));
    const weekend = isWeekendKey(date);
    const selCount = dayMatches.filter(m => selected.has(m.id)).length;
    const chip = document.createElement("button");
    const isToday = date === todayKey();
    chip.className = "cal-day" + (weekend ? " weekend" : "") + (isToday ? " today" : "");
    chip.dataset.date = date;
    chip.setAttribute("aria-label", `Jump to ${formatDate(date)}, ${dayMatches.length} matches${isToday ? " (today)" : ""}`);
    chip.innerHTML = `
      <div class="cal-dow">${d.toLocaleDateString("en-GB",{weekday:"short",timeZone:"UTC"})}${weekend ? " 🎉" : ""}</div>
      <div class="cal-num">${d.getUTCDate()}</div>
      <div class="cal-mon">${d.toLocaleDateString("en-GB",{month:"short",timeZone:"UTC"})}</div>
      <div class="cal-meta">${dayMatches.length}${selCount ? '<span class="cal-seldot"></span>' : ''}</div>
    `;
    chip.addEventListener("click", () => {
      collapsedDays.delete(date);
      renderList();
      const sec = document.getElementById("day-" + date);
      if (sec) sec.scrollIntoView({behavior:"smooth", block:"start"});
    });
    wrap.appendChild(chip);
  });
  wrap.scrollLeft = prevScroll;
}

function renderFilters() {
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
  STAGES.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (activeFilter === s ? " active" : "");
    btn.textContent = s;
    btn.setAttribute("aria-pressed", activeFilter === s);
    btn.addEventListener("click", () => { activeFilter = s; render(); });
    wrap.appendChild(btn);
  });
}

// Build one match card element (used by both Upcoming and Results views).
function buildCard(m) {
  const res = getResult(m);          // final score, or null if not played
  const played = !!res;
  const isSel = selected.has(m.id);
  const card = document.createElement("div");
  card.className = "match-card" + (isSel ? " selected" : "") + (played ? " played" : "");
  const lt = localTime(m);
  const ld = localDateKey(m), md = matchdayKey(m);
  let dd = 0;
  if (ld > md) dd = 1; else if (ld < md) dd = -1;
  const deltaMark = dd !== 0
    ? `<sup style='font-size:8px;vertical-align:super;opacity:.7'>${dd > 0 ? "+1" : "−1"}</sup>`
    : "";
  const timeDisplay = lt + deltaMark;
  card.dataset.id = m.id;

  // Resolve placeholders (e.g. "Winner A", "W74") to real teams when known.
  const homeName = slotTeam(m, "home");
  const awayName = slotTeam(m, "away");
  const homeResolved = homeName !== m.home;
  const awayResolved = awayName !== m.away;

  let timeCell, teamsHtml;
  if (played) {
    const [h, a] = res;
    const prov = isProvisional(m);
    const tag = prov
      ? `<span class="ft-tag prov" title="Provisional — not yet confirmed by the live feed">PROV</span>`
      : `<span class="ft-tag">FT</span>`;
    timeCell = `<span class="match-time score${prov ? " provisional" : ""}" aria-hidden="true">${h}<span class="score-dash">–</span>${a}${tag}</span>`;
    teamsHtml = `<span class="team${h>a?" win":""}">${homeName}</span> <span class="vs">vs</span> <span class="team${a>h?" win":""}">${awayName}</span>`;
    card.setAttribute("aria-label", `${homeName} vs ${awayName}, ${m.stage}, ${formatDate(md)}, ${prov ? "provisional" : "final"} score ${res[0]} ${res[1]} (played)`);
  } else {
    timeCell = `<span class="match-time">${timeDisplay}</span>`;
    const hCls = homeResolved ? " resolved" : "";
    const aCls = awayResolved ? " resolved" : "";
    teamsHtml = `<span class="team${hCls}">${homeName}</span> <span class="vs">vs</span> <span class="team${aCls}">${awayName}</span>`;
    card.setAttribute("role","checkbox");
    card.setAttribute("aria-checked", isSel);
    card.setAttribute("tabindex","0");
    card.setAttribute("aria-label", `${homeName} vs ${awayName}, ${m.stage}, ${formatDate(md)} at ${lt}${dd>0?" next day":dd<0?" previous day":""}`);
  }

  card.innerHTML = `
    ${played
      ? `<div class="played-mark" aria-hidden="true" title="Played"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>`
      : `<div class="check-box" aria-hidden="true">
      <svg class="check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>`}
    ${timeCell}
    <div class="match-info">
      <p class="match-teams">${teamsHtml}</p>
      <p class="match-venue">${m.venue}</p>
    </div>
    <span class="${badgeClass(m.stage)}">${badgeText(m.stage)}</span>
  `;

  if (!played) {
    const toggle = () => {
      if (selected.has(m.id)) selected.delete(m.id);
      else selected.add(m.id);
      render();
    };
    card.addEventListener("click", toggle);
    card.addEventListener("keydown", e => { if (e.key===" "||e.key==="Enter") { e.preventDefault(); toggle(); } });
  }
  return card;
}

// Upcoming tab: unplayed matches grouped by day, with collapse + selection.
function renderList() {
  const main = document.getElementById("matchList");
  const grouped = groupByDate(getFiltered());

  if (grouped.length === 0) {
    main.innerHTML = '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No upcoming matches found</p></div>';
    return;
  }

  main.innerHTML = "";
  grouped.forEach(([date, dayMatches]) => {
    const daySelected = dayMatches.filter(m => selected.has(m.id)).length;
    const countText = `${daySelected}/${dayMatches.length} selected`;
    const isCollapsed = collapsedDays.has(date);
    const section = document.createElement("section");
    section.className = "day-section" + (isCollapsed ? " collapsed" : "");
    section.id = "day-" + date;
    section.setAttribute("aria-label", formatDate(date));

    const header = document.createElement("div");
    header.className = "day-header";
    header.setAttribute("role", "button");
    header.setAttribute("tabindex", "0");
    header.setAttribute("aria-expanded", String(!isCollapsed));
    header.innerHTML = `
      <span class="day-toggle" aria-hidden="true">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
      <span class="day-label">${formatDate(date)}</span>
      <div class="day-rule" aria-hidden="true"></div>
      <span class="day-count">${countText}</span>
    `;
    const toggleDay = () => {
      if (collapsedDays.has(date)) collapsedDays.delete(date);
      else collapsedDays.add(date);
      renderList();
    };
    header.addEventListener("click", toggleDay);
    header.addEventListener("keydown", e => { if (e.key===" "||e.key==="Enter") { e.preventDefault(); toggleDay(); } });
    section.appendChild(header);

    const matchWrap = document.createElement("div");
    matchWrap.className = "matches";
    dayMatches.forEach(m => matchWrap.appendChild(buildCard(m)));
    section.appendChild(matchWrap);
    main.appendChild(section);
  });
}

// Results tab: played matches, grouped by day, most-recent day first.
function renderResults() {
  const main = document.getElementById("matchList");
  const played = getResults();

  if (played.length === 0) {
    let sub = "Final scores will appear here as matches are played.";
    let head = "No results yet";
    if (resultsStatus === "error") {
      head = "Results couldn’t load";
      sub = (location.protocol === "file:")
        ? "Live results are blocked when the file is opened directly from disk. Host it (or open via a local server) to load results."
        : "Couldn’t reach the live results feed. Check your connection and reopen.";
    } else if (resultsStatus === "loading") {
      head = "Loading results…";
      sub = "Fetching the latest scores.";
    }
    main.innerHTML = '<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 7v5l3 2"/></svg><p>' + head + '</p><p class="empty-sub">' + sub + '</p></div>';
    return;
  }

  // group by matchday, newest day first
  const map = {};
  played.forEach(m => { const k = matchdayKey(m); (map[k] = map[k] || []).push(m); });
  const days = Object.entries(map)
    .sort(([a],[b]) => b.localeCompare(a)); // newest first
  days.forEach(([, arr]) => arr.sort((a,b) => getMatchUTC(b) - getMatchUTC(a)));

  main.innerHTML = "";
  days.forEach(([date, dayMatches]) => {
    const section = document.createElement("section");
    section.className = "day-section";
    section.setAttribute("aria-label", formatDate(date));
    const header = document.createElement("div");
    header.className = "day-header static";
    header.innerHTML = `
      <span class="day-label">${formatDate(date)}</span>
      <div class="day-rule" aria-hidden="true"></div>
      <span class="day-count">${dayMatches.length} played</span>
    `;
    section.appendChild(header);
    const matchWrap = document.createElement("div");
    matchWrap.className = "matches";
    dayMatches.forEach(m => matchWrap.appendChild(buildCard(m)));
    section.appendChild(matchWrap);
    main.appendChild(section);
  });
}

function renderTray() {
  const tray = document.getElementById("exportTray");
  const count = document.getElementById("trayCount");
  count.textContent = selected.size;
  tray.classList.toggle("visible", selected.size > 0);
}

function renderSelectAll() {
  const btn = document.getElementById("selectAllBtn");
  const selectable = getFiltered().filter(isSelectable);
  const allSel = selectable.length > 0 && selectable.every(m => selected.has(m.id));
  btn.textContent = allSel ? "Deselect all" : "Select all";
  btn.style.display = selectable.length ? "" : "none";

  const cBtn = document.getElementById("collapseAllBtn");
  const dates = groupByDate(getFiltered()).map(([date]) => date);
  const allCollapsed = dates.length > 0 && dates.every(d => collapsedDays.has(d));
  cBtn.textContent = allCollapsed ? "Expand days" : "Collapse days";
}

function render() {
  rebuildBracket();
  pruneSelected();
  updateTabsUI();

  if (activeTab === "results") {
    renderResults();
    renderTray();   // tray stays in sync (hidden if nothing selected)
    return;
  }
  renderFilters();
  renderCalendar();
  renderList();
  renderTray();
  renderSelectAll();
}

// Show/hide the controls bar and tray per tab, update tab states + results badge.
function updateTabsUI() {
  const onResults = activeTab === "results";
  document.getElementById("controlsBar").style.display = onResults ? "none" : "";
  document.getElementById("tabUpcoming").classList.toggle("active", !onResults);
  document.getElementById("tabResults").classList.toggle("active", onResults);
  document.getElementById("tabUpcoming").setAttribute("aria-selected", String(!onResults));
  document.getElementById("tabResults").setAttribute("aria-selected", String(onResults));

  const badge = document.getElementById("resultsBadge");
  const n = getResults().length;
  badge.textContent = n;
  badge.hidden = n === 0;
}

// Tab switching
function switchTab(tab) {
  if (activeTab === tab) return;
  activeTab = tab;
  window.scrollTo({ top: 0, behavior: "auto" });
  render();
}
document.getElementById("tabUpcoming").addEventListener("click", () => switchTab("upcoming"));
document.getElementById("tabResults").addEventListener("click", () => switchTab("results"));

// Search
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

// Select all
document.getElementById("selectAllBtn").addEventListener("click", () => {
  const selectable = getFiltered().filter(isSelectable);
  const allSel = selectable.length > 0 && selectable.every(m => selected.has(m.id));
  selectable.forEach(m => allSel ? selected.delete(m.id) : selected.add(m.id));
  render();
});

// Collapse / expand all days
document.getElementById("collapseAllBtn").addEventListener("click", () => {
  const dates = groupByDate(getFiltered()).map(([date]) => date);
  const allCollapsed = dates.length > 0 && dates.every(d => collapsedDays.has(d));
  if (allCollapsed) dates.forEach(d => collapsedDays.delete(d));
  else dates.forEach(d => collapsedDays.add(d));
  render();
});

// iCal download
document.getElementById("btnICal").addEventListener("click", () => {
  const ics = buildICS(selected);
  const blob = new Blob([ics], {type:"text/calendar"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "wc2026-my-matches.ics"; a.click();
  URL.revokeObjectURL(url);
});

// Google Calendar
document.getElementById("btnGoogle").addEventListener("click", () => {
  const sel = MATCHES.filter(m => selected.has(m.id));
  sel.forEach((m, i) => setTimeout(() => window.open(toGoogleURL(m),"_blank"), i * 350));
});

// Outlook
document.getElementById("btnOutlook").addEventListener("click", () => {
  const sel = MATCHES.filter(m => selected.has(m.id));
  sel.forEach((m, i) => setTimeout(() => window.open(toOutlookURL(m),"_blank"), i * 350));
});

// Clear
document.getElementById("btnClear").addEventListener("click", () => {
  selected.clear();
  render();
});

// Calendar horizontal scroll: wheel + click-drag
(function setupCalendarScroll() {
  const cal = document.getElementById("calendar");

  // Translate vertical wheel into horizontal scroll
  cal.addEventListener("wheel", e => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      cal.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, { passive: false });

  // Click-drag to pan
  let isDown = false, startX = 0, startScroll = 0, moved = false;
  cal.addEventListener("pointerdown", e => {
    isDown = true; moved = false;
    startX = e.clientX;
    startScroll = cal.scrollLeft;
    cal.classList.add("dragging");
  });
  cal.addEventListener("pointermove", e => {
    if (!isDown) return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 4) moved = true;
    cal.scrollLeft = startScroll - dx;
  });
  const endDrag = () => { isDown = false; cal.classList.remove("dragging"); };
  cal.addEventListener("pointerup", endDrag);
  cal.addEventListener("pointerleave", endDrag);
  // Suppress chip click if the pointer was dragged
  cal.addEventListener("click", e => {
    if (moved) { e.stopPropagation(); e.preventDefault(); }
  }, true);
})();

// Today's date key (YYYY-MM-DD) in the selected timezone
function todayKey() {
  const p = partsInZone(new Date(), userTZ);
  return `${p.year}-${p.month}-${p.day}`;
}

// Find the match day to focus on open: today if there are matches today,
// otherwise the nearest upcoming match day, else the last day (tournament over).
function focusDateKey() {
  const days = groupByDate(getFiltered()).map(([d]) => d);
  if (!days.length) return null;
  const today = todayKey();
  if (days.includes(today)) return today;
  const upcoming = days.find(d => d >= today);
  return upcoming || days[days.length - 1];
}

// Scroll the calendar chip and the day section into view for the focus date.
// `force` allows tab-switches to always scroll; on initial load we only scroll
// when today actually has matches, so the page never opens scrolled to the bottom.
function jumpToToday(smooth, force) {
  const key = focusDateKey();
  if (!key) return;

  // On load (not forced): only auto-scroll if the focus day IS today. If the next
  // match is in the future, stay at the top instead of scrolling down to it.
  if (!force && key !== todayKey()) {
    // still align the calendar strip to the focus day, but don't move the page
    const cal0 = document.getElementById("calendar");
    const chip0 = cal0 && cal0.querySelector(`[data-date="${key}"]`);
    if (chip0 && cal0) cal0.scrollLeft = chip0.offsetLeft - (cal0.clientWidth / 2) + (chip0.clientWidth / 2);
    return;
  }

  const sec = document.getElementById("day-" + key);
  if (sec) sec.scrollIntoView({ behavior: smooth ? "smooth" : "auto", block: "start" });
  const cal = document.getElementById("calendar");
  const chip = cal && cal.querySelector(`[data-date="${key}"]`);
  if (chip && cal) {
    cal.scrollLeft = chip.offsetLeft - (cal.clientWidth / 2) + (chip.clientWidth / 2);
  }
}

// Init
render();
fetchResults();                 // pull latest final scores on open
window.scrollTo(0, 0);          // always start at the top — no auto-scroll
</script>
